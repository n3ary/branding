# ----------------------------------------------------------------------------
# [deploy] branding assets (on push to main)
#
# Deploys site/ + the freshly-built dist/ to the Cloudflare Pages
# project 'branding' (branding.n3ary.com). The Pages project name stays
# 'branding' in Cloudflare even though the repo lives at n3ary/branding.
#
# Trigger:     push to main
# Permissions: contents: read
# Secrets:     CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Owner:       @ciotlosm
# Run time:    ~2-3 min
# ----------------------------------------------------------------------------
name: '[deploy] branding assets (on push to main)'

on:
  push:
    branches: [main]

concurrency:
  group: branding-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    # Skip deploy when the release bot (n3ary-release-bot) is the actor.
    # The bot's release/calver-* PRs land on main as a squash merge; the
    # `push` event fires with `github.actor = n3ary-release-bot[bot]`.
    # Branding has no version concept, so the bot's commits are
    # empty. Re-deploying is harmless but wasteful.
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor == 'n3ary-release-bot[bot]'"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11 --activate

      - name: Install dependencies
        run: |
          pnpm clean --lockfile
          pnpm install --no-frozen-lockfile

      - name: Build artefacts
        run: pnpm run build

      - name: Assemble deploy bundle
        # Cloudflare Pages wants a single directory. Merge site/
        # (the HTML at root) with dist/ (PNG / ICO / SVGs).
        run: |
          mkdir -p deploy
          cp -R site/. deploy/
          cp -R dist/. deploy/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-dirty=true silences wrangler's "uncommitted
          # changes" warning (wrangler-action auto-installs itself
          # into the runner's package.json, but the runner is
          # ephemeral and the mutation never touches the real repo).
          command: pages deploy deploy --project-name=branding --branch=main --commit-dirty=true
