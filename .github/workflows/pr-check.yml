# ----------------------------------------------------------------------------
# [check] PR validation (on PR)
#
# Validates every PR: shared ASCII + standards-drift checks (drift disabled
# because branding does not vendor n3ary/standards), repo-specific type-check,
# build, and artefact verification. Never pushes to the branch.
#
# Trigger:     pull_request
# Permissions: contents: read
# Secrets:     none
# Owner:       @ciotlosm
# Run time:    ~1-2 min
# ----------------------------------------------------------------------------
name: '[check] PR validation (on PR)'

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions. enable-drift-check
# is false because branding does not vendor n3ary/standards (the org
# standards live one click away at github.com/n3ary/standards).
# Repo-specific jobs (type-check, build, artefact verification) stay local.

permissions:
  contents: read

jobs:
  pr-check:
    uses: n3ary/actions/.github/workflows/pr-check.yml@v24
    with:
      enable-drift-check: false

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11 --activate

      - name: Install dependencies
        # --no-frozen-lockfile: same rationale as the app repo -
        # pnpm 11's lockfile supply-chain check can fail on stale
        # entries from a registry republish; clean + re-resolve
        # keeps the install robust.
        run: |
          pnpm clean --lockfile
          pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Build artefacts
        run: pnpm run build

      - name: Verify expected artefacts
        run: |
          test -f dist/favicon.ico
          test -f dist/social/social-preview.png
          for size in 16 32 64 128 180 192 256 512 1024; do
            test -f "dist/neary-${size}.png"
          done
          for svg in src/logo/*.svg; do
            name=$(basename "$svg")
            test -f "dist/logo/$name"
          done
          echo "all expected artefacts present"
