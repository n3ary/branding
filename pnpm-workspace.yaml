packages:
  - '.'

# pnpm 11 blocks postinstall scripts by default. Pre-approve:
#
# - esbuild: needed by tsx (devDep) to bundle its CLI binary.
# - sharp: needed by our regen scripts (libvips native binary).
# - workerd: needed by the deploy step's auto-installed wrangler
#   (workerd is Cloudflare's JS runtime; wrangler pulls it in
#   to test Worker code locally). Only matters in CI.
#
# These scripts run on the install step (the dev box, the CI
# runner), not in the published bundle. Re-evaluate if any of
# these packages get compromised upstream.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
