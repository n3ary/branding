<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="neary">
  <title>neary — social preview</title>

  <!-- Background -->
  <rect width="1280" height="640" fill="#4F46E5"/>

  <!-- Marker pin — large, on the left -->
  <g transform="translate(160, 160)">
    <path d="M 70 50 L 186 50 Q 210 50 210 74 L 210 134 Q 210 158 188 170 L 128 230 L 68 170 Q 46 158 46 134 L 46 74 Q 46 50 70 50 Z" fill="#FFFFFF"/>
    <circle cx="128" cy="106" r="18" fill="#4F46E5"/>
  </g>

  <!-- Wordmark -->
  <text x="540" y="320"
