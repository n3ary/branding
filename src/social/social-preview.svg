        font-size="180"
        font-weight="700"
        letter-spacing="-8"
        fill="#FFFFFF">neary</text>

  <!-- Tagline -->
  <text x="544" y="400"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif"
        font-size="32"
